  <style>
    /* ===== CSS VARIABLES & RESET ===== */
    :root {
      --accent: #ff6f61;
      --accent-dark: #e85d50;
      --accent-light: #fff3f2;
      --secondary: #6c63ff;
      --success: #22c55e;
      --warning: #f59e0b;
      --muted: #6b7280;
      --muted-light: #9ca3af;
      --bg: #f8f7fb;
      --card: #ffffff;
      --border: rgba(0,0,0,0.07);
      --shadow-sm: 0 2px 8px rgba(12,20,30,0.06);
      --shadow-md: 0 4px 20px rgba(12,20,30,0.10);
      --shadow-lg: 0 10px 40px rgba(12,20,30,0.15);
      --radius: 14px;
      --radius-sm: 8px;
      --radius-full: 999px;
      --font: 'Nunito', system-ui, -apple-system, sans-serif;
      --transition: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      color: #1a1a2e;
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; height: auto; display: block; }

    /* ===== SKIP LINK (Accessibility) ===== */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 0;
      background: var(--accent);
      color: #fff;
      padding: 10px 20px;
      border-radius: 0 0 var(--radius-sm) 0;
      font-weight: 700;
      z-index: 100;
      transition: top var(--transition);
    }
    .skip-link:focus { top: 0; }

    /* ===== CONTAINER ===== */
    .container { max-width: 1060px; margin: 0 auto; padding: 0 20px; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 20px;
      border-radius: var(--radius-sm);
      border: 0;
      cursor: pointer;
      font-family: var(--font);
      font-weight: 700;
      font-size: 15px;
      transition: all var(--transition);
      text-decoration: none;
      line-height: 1;
    }
    .btn:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(255,111,97,0.35);
    }
    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,111,97,0.45); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 0;
    }
    .btn-ghost:hover { color: #1a1a2e; background: rgba(0,0,0,0.04); }

    .btn-outline {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }
    .btn-outline:hover { background: var(--accent-light); }

    .btn-secondary {
      background: #f0f0ff;
      color: var(--secondary);
    }
    .btn-secondary:hover { background: #e0e0ff; }

    .btn-buy {
      background: var(--accent);
      color: #fff;
      flex: 1;
      box-shadow: 0 3px 10px rgba(255,111,97,0.25);
    }
    .btn-buy:hover { background: var(--accent-dark); transform: translateY(-1px); }

    .btn-lg { padding: 14px 28px; font-size: 17px; border-radius: var(--radius); }

    /* ===== COOKIE CONSENT BANNER ===== */
    #cookie-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      color: #fff;
      padding: 16px 20px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
      transition: transform 0.4s ease;
    }
    #cookie-banner.hidden { transform: translateY(110%); }
    #cookie-banner p { flex: 1; min-width: 220px; font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.5; }
    #cookie-banner p a { color: #fff; text-decoration: underline; }
    .cookie-actions { display: flex; gap: 10px; flex-shrink: 0; }
    .btn-cookie-accept { background: var(--accent); color: #fff; padding: 9px 18px; border-radius: var(--radius-sm); border: 0; cursor: pointer; font-family: var(--font); font-weight: 700; font-size: 14px; }
    .btn-cookie-reject { background: transparent; color: rgba(255,255,255,0.7); padding: 9px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-sm); cursor: pointer; font-family: var(--font); font-weight: 600; font-size: 14px; }
    .btn-cookie-accept:hover { background: var(--accent-dark); }
    .btn-cookie-reject:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

    /* ===== HEADER ===== */
    header {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 30;
      border-bottom: 1px solid var(--border);
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: space-between;
      padding: 14px 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 22px;
      color: var(--accent);
    }
    .brand-sub { font-size: 12px; color: var(--muted); font-weight: 600; display: none; }
    .nav-links { display: flex; gap: 4px; align-items: center; }

    /* Mobile nav toggle */
    .nav-toggle {
      display: none;
      background: transparent;
      border: 0;
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius-sm);
      color: #1a1a2e;
    }
    .nav-toggle:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
    .nav-toggle svg { display: block; }

    /* ===== ANNOUNCEMENT BAR ===== */
    .announcement {
      background: linear-gradient(90deg, var(--accent), var(--secondary));
      color: #fff;
      text-align: center;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .announcement a { color: #fff; text-decoration: underline; }

    /* ===== SEARCH BAR ===== */
    .search-bar {
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .search-inner {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      position: relative;
      max-width: 480px;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      font-family: var(--font);
      font-size: 14px;
      background: var(--bg);
      color: #1a1a2e;
      transition: border-color var(--transition);
    }
    .search-wrap input:focus { outline: none; border-color: var(--accent); background: #fff; }
    .search-wrap .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-light);
      pointer-events: none;
    }
    .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-left: 8px; }
    .chip {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border);
      background: #fff;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      transition: all var(--transition);
    }
    .chip:hover, .chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .chip:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #fff 55%, #f0f4ff 100%);
      padding: 60px 0 50px;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 32px;
      align-items: center;
    }
    .hero h1 {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 14px;
      color: #1a1a2e;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero .lead { color: var(--muted); margin-bottom: 24px; font-size: 16px; max-width: 480px; }
    .hero .actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 28px; }
    .features { display: flex; gap: 10px; flex-wrap: wrap; }
    .feature {
      background: #fff;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 700;
      color: #444;
      box-shadow: var(--shadow-sm);
    }

    .hero-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 22px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }
    .hero-card h3 { font-size: 16px; font-weight: 800; margin-bottom: 10px; }
    .hero-card p { font-size: 14px; color: var(--muted); margin-bottom: 14px; }
    .trust-mini { display: flex; flex-direction: column; gap: 8px; }
    .trust-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #333; }
    .trust-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }

    /* ===== STATS BAR ===== */
    .stats-bar {
      background: #fff;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stats-inner {
      display: flex;
      justify-content: center;
      gap: 0;
    }
    .stat-item {
      flex: 1;
      text-align: center;
      padding: 18px 12px;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: 0; }
    .stat-num { font-size: 22px; font-weight: 900; color: var(--accent); display: block; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 2px; }

    /* ===== PRODUCTS ===== */
    .products { padding: 40px 0; }
    .section-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .section-title { font-size: clamp(20px, 3vw, 28px); font-weight: 900; }
    .section-sub { color: var(--muted); font-size: 15px; margin-top: 4px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }

    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }

    .card-emoji {
      font-size: 42px;
      margin-bottom: 10px;
      line-height: 1;
    }
    .card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; min-height: 26px; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .badge-bestseller { background: #fff3cd; color: #b45309; }
    .badge-nou { background: #dcfce7; color: #15803d; }
    .badge-promo { background: #fee2e2; color: #dc2626; }

    .card .title { font-weight: 800; font-size: 16px; margin-bottom: 5px; }
    .meta { color: var(--muted); font-size: 13px; margin-bottom: 12px; font-weight: 600; }
    .price { display: flex; gap: 8px; align-items: baseline; font-weight: 800; margin-bottom: 4px; }
    .price .old { color: var(--muted-light); text-decoration: line-through; font-weight: 600; font-size: 14px; }
    .price .now { color: #1a1a2e; font-size: 20px; }
    .price-save { font-size: 11px; color: var(--success); font-weight: 800; margin-bottom: 12px; }

    .card .buy { margin-top: auto; padding-top: 12px; display: flex; gap: 8px; }
    .btn-wishlist {
      background: #f8f7fb;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .btn-wishlist:hover { background: #fee2e2; border-color: #fca5a5; }
    .btn-wishlist.active { background: #fee2e2; border-color: #f87171; }
    .btn-wishlist:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

    .card-hidden { display: none !important; }

    /* ===== BUNDLE SECTION ===== */
    .bundle-section { padding: 32px 0; }
    .bundle-card {
      background: linear-gradient(135deg, #1a1a2e, #2d2b6e);
      color: #fff;
      border-radius: var(--radius);
      padding: 28px;
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }
    .bundle-info { flex: 1; min-width: 200px; }
    .bundle-info h3 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
    .bundle-info p { color: rgba(255,255,255,0.75); font-size: 15px; margin-bottom: 14px; }
    .bundle-books { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .bundle-tag { background: rgba(255,255,255,0.12); padding: 4px 10px; border-radius: var(--radius-full); font-size: 12px; font-weight: 700; }
    .bundle-price { text-align: center; flex-shrink: 0; }
    .bundle-price .old { font-size: 16px; color: rgba(255,255,255,0.5); text-decoration: line-through; font-weight: 600; }
    .bundle-price .now { font-size: 36px; font-weight: 900; color: #fde68a; line-height: 1; }
    .bundle-price .label { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .bundle-price .btn-primary { margin-top: 12px; width: 100%; }

    /* ===== HOW IT WORKS ===== */
    .how-section { padding: 40px 0; }
    .how {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }
    .how .section-title { margin-bottom: 6px; }
    .how .section-sub { margin-bottom: 24px; }
    .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
    .step {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      padding: 18px;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .step .num {
      background: var(--accent);
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: inline-grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      flex-shrink: 0;
    }
    .step-title { font-weight: 800; font-size: 15px; }
    .step p { font-size: 13px; color: var(--muted); font-weight: 600; line-height: 1.5; }

    /* ===== TRUST BADGES ===== */
    .trust-section { padding: 28px 0; }
    .trust-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .trust-badge {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 120px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .trust-badge .icon { font-size: 26px; }
    .trust-badge .label { font-size: 12px; font-weight: 800; color: #333; line-height: 1.3; }
    .trust-badge .sub { font-size: 11px; color: var(--muted); font-weight: 600; }

    /* Payment logos */
    .payment-logos {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
      justify-content: center;
    }
    .pay-logo {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 800;
      color: #444;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ===== TESTIMONIALS ===== */
    .testimonials { padding: 40px 0; }
    .test-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    .test-card {
      background: #fff;
      padding: 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .stars { color: #f59e0b; font-size: 16px; letter-spacing: 2px; }
    .test-quote { font-size: 15px; font-weight: 700; color: #1a1a2e; line-height: 1.5; flex: 1; }
    .test-author { display: flex; align-items: center; gap: 10px; }
    .test-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .test-name { font-size: 13px; font-weight: 800; }
    .test-location { font-size: 12px; color: var(--muted); font-weight: 600; }
    .verified { font-size: 11px; color: var(--success); font-weight: 700; display: flex; align-items: center; gap: 3px; }

    /* ===== NEWSLETTER ===== */
    .newsletter-section { padding: 32px 0; }

      background: linear-gradient(135deg, var(--accent-light), #f0f4ff);

      padding: 12px 16px;

      align-items: center;
      font-size: 15px;
      user-select: none;

    summary:focus-visible { outline: 3px solid var(--accent); outline-offset: -3px; }
    details .faq-body { padding: 0 18px 16px; color: var(--muted); font-size: 14px; font-weight: 600; line-height: 1.6; }
    details .faq-body a { color: var(--accent); text-decoration: underline; }

    /* ===== CTA SECTION ===== */

      padding: 40px 0;
    }
    .cta-card {
      background: linear-gradient(135deg, #fff 0%, #f8fbff 100%);

      border: 1px solid var(--border);
      padding: 40px;
      text-align: center;

    .cta-card p { color: var(--muted); font-size: 16px; margin-bottom: 24px; }

      color: #fff;
      padding: 40px 0 20px;

    }

      display: grid;

    .footer-col ul li a:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 2px; }

      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 18px;

      justify-content: space-between;
      align-items: center;

      padding: 20px;
      z-index: 60;
      backdrop-filter: blur(3px);

    .modal-backdrop.open { display: grid; }
    .modal {

      border-radius: var(--radius);

      box-shadow: var(--shadow-lg);
      animation: slideUp 0.25s ease;

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);

      height: 34px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

    .close:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

      font-family: var(--font);
      font-size: 15px;
      color: #1a1a2e;
      background: #fff;

      background: var(--bg);

      font-size: 13px;
      cursor: pointer;

    }
    .btn-coupon:hover { border-color: var(--accent); color: var(--accent); }

    #coupon-msg.ok { color: var(--success); display: block; }
    #coupon-msg.err { color: #dc2626; display: block; }

    .order-summary {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid var(--border);

    .order-row:last-child { margin-bottom: 0; font-size: 16px; font-weight: 900; padding-top: 8px; border-top: 1px solid var(--border); }

    .modal-secure { font-size: 12px; color: var(--muted); font-weight: 700; display: flex; align-items: center; gap: 5px; justify-content: center; margin-top: 12px; }

    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn-primary { flex: 1; }

    /* ===== SUCCESS MESSAGE ===== */
    .success-overlay {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .success-overlay.show { display: block; }
    .success-icon { font-size: 56px; margin-bottom: 14px; }
    .success-overlay h3 { font-size: 20px; font-weight: 900; margin-bottom: 8px; }
    .success-overlay p { color: var(--muted); font-size: 14px; font-weight: 600; }

    /* ===== WISHLIST TOAST ===== */
    #toast {
      position: fixed;
      bottom: 90px;
      right: 20px;
      background: #1a1a2e;
      color: #fff;
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 700;
      z-index: 200;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      box-shadow: var(--shadow-lg);
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ===== BACK TO TOP ===== */
    #back-top {
      position: fixed;
      bottom: 24px;
      right: 20px;
      background: var(--accent);
      color: #fff;
      border: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;

    #back-top:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 880px) {
      .hero-grid { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr 1fr; }
      .stats-inner { gap: 0; }
    }
    @media (max-width: 640px) {

      .search-bar .filter-chips { display: none; }
      .search-inner { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
    }

  <script>
  (function() {
    'use strict';

    /* ===== COOKIE CONSENT ===== */
    const banner = document.getElementById('cookie-banner');
    if (localStorage.getItem('cookie-consent')) {
      banner.classList.add('hidden');
    }
    document.getElementById('cookie-accept').addEventListener('click', function() {
      localStorage.setItem('cookie-consent', 'accepted');
      banner.classList.add('hidden');
      showToast('✅ Cookie-uri acceptate. Mulțumim!');
    });
    document.getElementById('cookie-reject').addEventListener('click', function() {
      localStorage.setItem('cookie-consent', 'rejected');
      banner.classList.add('hidden');
    });

    /* ===== MOBILE NAV TOGGLE ===== */
    const navToggle = document.getElementById('nav-toggle');
    const navLinks = document.getElementById('nav-links');
    navToggle.addEventListener('click', function() {
      const isOpen = navLinks.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', isOpen.toString());
      navToggle.setAttribute('aria-label', isOpen ? 'Închide meniu' : 'Deschide meniu');
    });
    // Close nav on link click (mobile)
    navLinks.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        navLinks.classList.remove('open');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });

    /* ===== SEARCH & FILTER ===== */
    const searchInput = document.getElementById('search-input');
    const chips = document.querySelectorAll('.chip');
    const cards = document.querySelectorAll('#products-grid .card');
    const noResults = document.getElementById('no-results');
    let activeFilter = 'all';

    function filterProducts() {
      const query = searchInput.value.toLowerCase().trim();
      let visible = 0;
      cards.forEach(function(card) {
        const title = (card.dataset.title || '').toLowerCase();
        const age = parseInt(card.dataset.age) || 0;
        const matchSearch = !query || title.includes(query);
        const matchFilter = activeFilter === 'all' || age === parseInt(activeFilter);
        if (matchSearch && matchFilter) {
          card.classList.remove('card-hidden');
          visible++;
        } else {
          card.classList.add('card-hidden');
        }
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
    }

    searchInput.addEventListener('input', filterProducts);

    chips.forEach(function(chip) {
      chip.addEventListener('click', function() {
        chips.forEach(function(c) { c.classList.remove('active'); c.setAttribute('aria-pressed', 'false'); });
        chip.classList.add('active');
        chip.setAttribute('aria-pressed', 'true');
        activeFilter = chip.dataset.filter;
        filterProducts();
      });
    });

    /* ===== WISHLIST ===== */
    const wishlist = JSON.parse(localStorage.getItem('colorboo-wishlist') || '[]');

    function updateWishlistUI() {
      document.querySelectorAll('.btn-wishlist').forEach(function(btn) {
        const sku = btn.dataset.sku;
        const active = wishlist.includes(sku);
        btn.textContent = active ? '♥' : '♡';
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active.toString());
        btn.setAttribute('aria-label', (active ? 'Elimină din favorite: ' : 'Adaugă la favorite: ') + btn.closest('.card').querySelector('.title').textContent);
      });
    }
    updateWishlistUI();

    document.querySelectorAll('.btn-wishlist').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const sku = btn.dataset.sku;
        const title = btn.closest('.card').querySelector('.title').textContent;
        const idx = wishlist.indexOf(sku);
        if (idx === -1) {
          wishlist.push(sku);
          showToast('❤️ „' + title + '" adăugat la favorite!');
        } else {
          wishlist.splice(idx, 1);
          showToast('💔 „' + title + '" eliminat din favorite.');
        }
        localStorage.setItem('colorboo-wishlist', JSON.stringify(wishlist));
        updateWishlistUI();
      });
    });

    /* ===== MODAL / CHECKOUT ===== */
    const modal = document.getElementById('modal');
    const modalFormBody = document.getElementById('modal-form-body');
    const successOverlay = document.getElementById('success-overlay');
    const emailInput = document.getElementById('checkout-email');
    const emailError = document.getElementById('email-error');
    const couponInput = document.getElementById('coupon-input');
    const couponMsg = document.getElementById('coupon-msg');
    const summaryProduct = document.getElementById('summary-product');
    const summaryDiscount = document.getElementById('summary-discount');
    const summaryTotal = document.getElementById('summary-total');
    const selectedSkuEl = document.getElementById('selected-sku');
    const selectedPriceEl = document.getElementById('selected-price');
    const successMsg = document.getElementById('success-msg');

    const VALID_COUPONS = { 'COLORBOO10': 10, 'START20': 20 };
    let current = null;
    let discount = 0;

    function openModal(sku, price, title) {
      current = { sku: sku, price: parseInt(price), title: title };
      discount = 0;
      selectedSkuEl.textContent = title;
      selectedPriceEl.textContent = price + ' lei';
      summaryProduct.textContent = title;
      summaryDiscount.textContent = '0 lei';
      summaryTotal.textContent = price + ' lei';
      emailInput.value = '';
      couponInput.value = '';
      couponMsg.className = '';
      couponMsg.textContent = '';
      emailInput.classList.remove('error');
      emailError.classList.remove('show');
      modalFormBody.style.display = 'block';
      successOverlay.classList.remove('show');
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(function() { emailInput.focus(); }, 100);

      // Track analytics event
      if (typeof gtag !== 'undefined') {
        gtag('event', 'begin_checkout', { currency: 'RON', value: price, items: [{ item_id: sku, item_name: title, price: price }] });
      }
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      current = null;
    }

    function updateSummary() {
      if (!current) return;
      const disc = Math.round(current.price * discount / 100);
      const total = current.price - disc;
      summaryDiscount.textContent = disc > 0 ? '-' + disc + ' lei' : '0 lei';
      summaryTotal.textContent = total + ' lei';
    }

    // Wire buy buttons
    document.querySelectorAll('.btn-buy').forEach(function(btn) {
      btn.addEventListener('click', function() {
        const card = btn.closest('.card');
        openModal(btn.dataset.sku, btn.dataset.price, card.querySelector('.title').textContent.trim());
      });
    });

    // Bundle buy
    document.getElementById('buy-bundle').addEventListener('click', function() {
      openModal('pachet-complet', '64', '📦 Pachet Complet (6 cărți)');
    });

    document.getElementById('close-modal').addEventListener('click', closeModal);
    document.getElementById('cancel-modal').addEventListener('click', closeModal);
    document.getElementById('close-success').addEventListener('click', closeModal);

    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });

    // Coupon apply
    document.getElementById('apply-coupon').addEventListener('click', function() {
      const code = couponInput.value.trim().toUpperCase();
      if (VALID_COUPONS[code] !== undefined) {
        discount = VALID_COUPONS[code];
        couponMsg.className = 'ok';
        couponMsg.textContent = '✅ Cod aplicat! Reducere de ' + discount + '%.';
        updateSummary();
      } else {
        discount = 0;
        couponMsg.className = 'err';
        couponMsg.textContent = '❌ Cod invalid sau expirat.';
        updateSummary();
      }
    });

    // Checkout submit
    document.getElementById('checkout-submit').addEventListener('click', function() {
      const mail = emailInput.value.trim();
      const isValid = mail && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(mail);
      if (!isValid) {
        emailInput.classList.add('error');
        emailError.classList.add('show');
        emailInput.focus();
        return;
      }
      emailInput.classList.remove('error');
      emailError.classList.remove('show');

      // Analytics conversion
      if (typeof gtag !== 'undefined' && current) {
        const disc = Math.round(current.price * discount / 100);
        gtag('event', 'purchase', { currency: 'RON', value: current.price - disc, transaction_id: 'CB-' + Date.now(), items: [{ item_id: current.sku, item_name: current.title, price: current.price - disc }] });
      }

      modalFormBody.style.display = 'none';
      successOverlay.classList.add('show');
      successMsg.innerHTML = 'Vei primi PDF-ul la <strong>' + mail + '</strong> în câteva secunde.<br/><br/>Verifică și folderul <strong>Spam</strong> dacă nu îl găsești în inbox.';
    });

    /* ===== NEWSLETTER ===== */
    document.getElementById('newsletter-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const emailEl = this.querySelector('input[type="email"]');
      const mail = emailEl.value.trim();
      if (!mail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(mail)) {
        emailEl.focus();
        showToast('⚠️ Introdu o adresă de email validă.');
        return;
      }
      showToast('🎉 Abonare reușită! Verifică emailul pentru codul de 10% reducere.');
      emailEl.value = '';
    });

    /* ===== TOAST ===== */
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    /* ===== BACK TO TOP ===== */
    const backTop = document.getElementById('back-top');
    window.addEventListener('scroll', function() {
      backTop.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    backTop.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

  })();
  </script>
</body>
</html>
